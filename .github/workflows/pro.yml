name: Deploy to Production

on:
  push:
    branches: [ main ]
env:
  IMAGE_NAME: xidp/info-manager

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: DockerHub
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }}
          push: true
  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /app/info-manager
            cd /app/info-manager
            
            # 创建 docker-compose.yml
            cat > docker-compose.yml << 'EOF'
            services:
              app:
                image: xidp/info-manager:latest
                container_name: info-manager
                ports:
                  - "9528:9528"
                environment:
                  - TZ=Asia/Shanghai
                volumes:
                  - /opt/xidp/conf/config.yml:/opt/xidp/conf/config.yml:ro
                  - /var/log/info-manager/logs:/opt/xidp/logs
                restart: unless-stopped
                networks:
                  - xidp-network
            networks:
              xidp-network:
                driver: bridge
            EOF
            
            # 停止旧容器并启动新容器
            docker compose down || true
            docker compose pull
            docker compose up -d